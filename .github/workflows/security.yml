name: Reusable Semgrep Scan

on:
  workflow_call:

jobs:
  semgrep_scan:
    name: Security Scan (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep Scan
        run: |
          pip install semgrep
          
          # 1. Cria o arquivo de regras localmente usando o terminal
          cat << 'EOF' > regras-locais.yml
          rules:
            - id: python-injection-system
              pattern: os.system(...)
              message: "PERIGO: Detectado uso de os.system! Isso e vulneravel a Injecao de Comando."
              languages: [python]
              severity: ERROR
          EOF

          # 2. Roda o Semgrep apontando para o arquivo que acabamos de criar
          semgrep --config regras-locais.yml .
