name: Reusable OWASP ZAP Scan

on:
  workflow_call:
    inputs:
      target_url:
        required: true
        type: string
        description: 'A URL do site/aplicação que será testada'
  
  # Adicionamos isso aqui para você conseguir rodar direto dele para testar!
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL para testar manualmente'
        required: true
        default: 'https://www.zaproxy.org'

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Run OWASP ZAP Baseline Scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.13.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ github.event.inputs.target_url || inputs.target_url }}
          rules_file_name: '.zap/rules.tsv'
          fail_action: false
          artifact_name: 'zap_scan_results' 
