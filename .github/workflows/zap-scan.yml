name: Reusable OWASP ZAP Scan

on:
  workflow_call:
    inputs:
      target_url:
        required: true
        type: string
        description: 'A URL do site/aplicação que será testada'

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Run OWASP ZAP Baseline Scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.13.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ inputs.target_url }}
          rules_file_name: '.zap/rules.tsv'
          fail_action: false
          # IMPORTANTE: Desativamos o upload padrão que causou o bug
          artifact_name: '' 

      # Fazemos o upload do relatório manualmente usando a action oficial e atualizada
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-report
          path: |
            report_html.html
            report_md.md
            report_json.json
